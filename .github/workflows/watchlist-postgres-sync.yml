# Scan E*Trade option chains for watchlist tickers, compute Wheel Alpha,
# and write to PostgreSQL: etrade_sessions, options_scans, wheel_alpha_results.
#
# Required repository secrets:
#   DATABASE_URL              — postgresql://... (use SSL params if your host requires it)
#   ETRADE_CONSUMER_KEY       — same as local .env
#   ETRADE_CONSUMER_SECRET
#   ETRADE_OAUTH_TOKEN        — access token (oauth_token from .etrade_tokens.json)
#   ETRADE_OAUTH_TOKEN_SECRET — access token secret
#   ETRADE_SANDBOX            — exactly "true" or "false" (must match token environment)
#   WATCHLIST_JSON            — e.g. ["AAPL","NVDA","VXX"]  (repo file is gitignored locally)
#
# E*Trade tokens expire; refresh them locally and update secrets when quotes start failing.
#
name: Watchlist scan → Postgres

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes UTC (edit as needed)
    - cron: "*/30 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run watchlist scan + Wheel Alpha
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ETRADE_CONSUMER_KEY: ${{ secrets.ETRADE_CONSUMER_KEY }}
          ETRADE_CONSUMER_SECRET: ${{ secrets.ETRADE_CONSUMER_SECRET }}
          ETRADE_OAUTH_TOKEN: ${{ secrets.ETRADE_OAUTH_TOKEN }}
          ETRADE_OAUTH_TOKEN_SECRET: ${{ secrets.ETRADE_OAUTH_TOKEN_SECRET }}
          ETRADE_SANDBOX: ${{ secrets.ETRADE_SANDBOX }}
          WATCHLIST_JSON: ${{ secrets.WATCHLIST_JSON }}
        run: python scripts/watchlist_snapshot_to_postgres.py
