# Scan E*Trade option chains for watchlist tickers, compute Wheel Alpha,
# and write to PostgreSQL: options_scans (reads OAuth tokens from etrade_sessions).
#
# Refresh tokens out-of-band (e.g. scripts/etrade_token_refresh.py on your machine or PythonAnywhere).
#
# Required repository secrets:
#   DATABASE_URL              — postgresql://... (Supabase: prefer pooler URI for CI; password must be URL-encoded)
#   ETRADE_CONSUMER_KEY
#   ETRADE_CONSUMER_SECRET
#   ETRADE_SANDBOX            — exactly "true" or "false"
#   WATCHLIST_JSON            — optional if watchlists has at least one row (scan merges all owners); else e.g. ["AAPL","NVDA"]
#
# Optional secrets:
#   DATABASE_IPV4             — explicit IPv4 for hostaddr if DB DNS is IPv6-only
#
name: Watchlist scan → Postgres

on:
  workflow_dispatch:
  schedule:
    # US equity RTH in Central: 8:30–15:00 (8:30 AM first run, 3:00 PM last), every 30 min, Mon–Fri.
    - cron: "30 8 * * 1-5"
      timezone: "America/Chicago"
    - cron: "0,30 9-14 * * 1-5"
      timezone: "America/Chicago"
    - cron: "0 15 * * 1-5"
      timezone: "America/Chicago"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: pip install -r requirements-ci.txt

      - name: Run watchlist scan + Wheel Alpha
        env:
          DATABASE_FORCE_IPV4: "1"
          DATABASE_IPV4: ${{ secrets.DATABASE_IPV4 }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ETRADE_CONSUMER_KEY: ${{ secrets.ETRADE_CONSUMER_KEY }}
          ETRADE_CONSUMER_SECRET: ${{ secrets.ETRADE_CONSUMER_SECRET }}
          ETRADE_SANDBOX: ${{ secrets.ETRADE_SANDBOX }}
          # Omit WATCHLIST_JSON when watchlists has at least one row (scan merges symbols from every owner).
          WATCHLIST_JSON: ${{ secrets.WATCHLIST_JSON }}
        run: python scripts/watchlist_snapshot_to_postgres.py
